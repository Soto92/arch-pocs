server:
  port: 8081

spring:
  application:
    name: ingestion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/pipeline
    username: pipeline
    password: pipeline
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

pipeline:
  kafka:
    topic: sales.raw
  files:
    inbox: ../data/inbox
  api:
    sales-url: http://localhost:8088/sales
  lineage:
    enabled: true
    endpoint: http://localhost:5000/api/v1/lineage
    namespace: data-pipeline
  ingestion:
    interval-ms: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

